<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abdourahmane Touré — Portfolio</title>
  <link rel="icon" href="react.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Grotesk:wght@300;400;500&family=JetBrains+Mono:wght@300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0b0b0f;
      --gold:       #c9a96e;
      --gold-dim:   rgba(201,169,110,0.18);
      --gold-faint: rgba(201,169,110,0.07);
      --text:       #e8e3dc;
      --muted:      #6b6560;
    }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
    }

    /* ══════════════════════════════
       SCÈNE PRINCIPALE
    ══════════════════════════════ */
    .scene {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    /* ══════════════════════════════
       CÔTÉ GAUCHE — décoratif
    ══════════════════════════════ */
    .left {
      position: relative;
      width: 50%;
      height: 100vh;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ---- Ligne verticale dorée ---- */
    .v-line {
      position: absolute;
      left: 50%;
      top: 0;
      height: 100%;
      width: 1px;
      transform: translateX(-50%);
      background: linear-gradient(
        to bottom,
        transparent 0%,
        var(--gold) 10%,
        var(--gold) 90%,
        transparent 100%
      );
      z-index: 2;
      animation: drawLine 1.2s ease 0.2s both;
    }

    /* ---- Cadre photo ---- */
    .photo-frame {
      position: relative;
      z-index: 3;
      height: 52vh;
      aspect-ratio: 3 / 4;
      border: 1.5px solid var(--gold);
      overflow: hidden;
      background: var(--bg);
      box-shadow:
        0 0 0 6px var(--bg),
        0 0 0 7px var(--gold-dim),
        0 0 60px rgba(201,169,110,0.06);
      animation: scaleIn 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 1s both;
    }

    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 5%;
      display: block;
      filter: brightness(0.82) grayscale(12%);
    }

    /* ---- Accolades de coin ---- */
    .photo-frame .corner {
      position: absolute;
      width: 14px;
      height: 14px;
      z-index: 4;
    }
    .corner.tl { top:    -1px; left:  -1px; border-top:   1.5px solid var(--gold); border-left:   1.5px solid var(--gold); }
    .corner.tr { top:    -1px; right: -1px; border-top:   1.5px solid var(--gold); border-right:  1.5px solid var(--gold); }
    .corner.bl { bottom: -1px; left:  -1px; border-bottom:1.5px solid var(--gold); border-left:   1.5px solid var(--gold); }
    .corner.br { bottom: -1px; right: -1px; border-bottom:1.5px solid var(--gold); border-right:  1.5px solid var(--gold); }

    /* ══════════════════════════════
       ÉLÉMENTS DÉCORATIFS
    ══════════════════════════════ */

    /* Grand cercle en arrière-plan, rotation lente */
    .deco-circle-lg {
      position: absolute;
      width: 52vh;
      height: 52vh;
      border: 1px solid var(--gold-faint);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: spin-slow 50s linear infinite, fadeInDeco 0.8s ease 0.4s both;
      z-index: 1;
    }

    /* Cercle moyen, contre-rotation */
    .deco-circle-md {
      position: absolute;
      width: 30vh;
      height: 30vh;
      border: 1px dashed var(--gold-dim);
      border-radius: 50%;
      top: 12%;
      left: 8%;
      animation: spin-slow 30s linear infinite reverse, fadeInDeco 0.8s ease 0.5s both;
      z-index: 1;
    }

    /* Grille de points */
    .deco-dots {
      position: absolute;
      right: 7%;
      top: 14%;
      width: 72px;
      height: 72px;
      background-image: radial-gradient(circle, rgba(201,169,110,0.45) 1px, transparent 1px);
      background-size: 12px 12px;
      animation: floatY 6s ease-in-out infinite, fadeInDeco 0.7s ease 0.55s both;
      z-index: 1;
    }

    /* Grille de points 2 */
    .deco-dots-2 {
      position: absolute;
      left: 7%;
      bottom: 16%;
      width: 54px;
      height: 54px;
      background-image: radial-gradient(circle, rgba(201,169,110,0.3) 1px, transparent 1px);
      background-size: 10px 10px;
      animation: floatY 8s ease-in-out infinite reverse, fadeInDeco 0.7s ease 0.65s both;
      z-index: 1;
    }

    /* Carré tournant */
    .deco-sq-1 {
      position: absolute;
      width: 42px;
      height: 42px;
      border: 1px solid var(--gold-dim);
      bottom: 22%;
      right: 9%;
      animation: floatY 7s ease-in-out infinite, spin-slow 18s linear infinite, fadeInDeco 0.7s ease 0.6s both;
      z-index: 1;
    }

    /* Petit carré */
    .deco-sq-2 {
      position: absolute;
      width: 18px;
      height: 18px;
      border: 1px solid rgba(201,169,110,0.25);
      top: 24%;
      left: 9%;
      transform: rotate(30deg);
      animation: floatY 9s ease-in-out infinite, fadeInDeco 0.7s ease 0.7s both;
      z-index: 1;
    }

    /* Lignes horizontales courtes */
    .deco-h {
      position: absolute;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
      animation: floatY 7s ease-in-out infinite, fadeInDeco 0.7s ease 0.75s both;
      z-index: 1;
    }
    .deco-h-1 { width: 50px; top: 32%; left: 4%; }
    .deco-h-2 { width: 35px; bottom: 30%; right: 4%; animation-direction: reverse; animation-duration: 5s; }

    /* Zigzag SVG */
    .deco-zigzag {
      position: absolute;
      bottom: 14%;
      right: 5%;
      opacity: 0.28;
      animation: floatY 10s ease-in-out infinite, fadeInDeco 0.7s ease 0.8s both;
      z-index: 1;
    }

    /* Zigzag SVG 2 */
    .deco-zigzag-2 {
      position: absolute;
      top: 18%;
      left: 4%;
      opacity: 0.2;
      animation: floatY 8s ease-in-out infinite reverse, fadeInDeco 0.7s ease 0.85s both;
      z-index: 1;
    }

    /* Fragments de code */
    .deco-code {
      position: absolute;
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(0.55rem, 0.7vw, 0.72rem);
      font-weight: 300;
      color: rgba(201,169,110,0.2);
      animation: floatY 8s ease-in-out infinite, fadeInDeco 0.7s ease 0.9s both;
      white-space: nowrap;
      z-index: 1;
    }
    .deco-code-1 { top: 12%;  left:  6%; animation-duration: 7s,  0.7s;  }
    .deco-code-2 { bottom:18%; left:  5%; animation-duration: 9s,  0.7s; animation-direction: reverse, normal; }
    .deco-code-3 { top: 56%;  right: 7%; animation-duration: 6s,  0.7s;  }
    .deco-code-4 { top: 38%;  left:  4%; animation-duration: 11s, 0.7s; animation-direction: reverse, normal; }

    /* ══════════════════════════════
       CÔTÉ DROIT — texte
    ══════════════════════════════ */
    .right {
      position: relative;
      flex: 1;
      display: flex;
      align-items: center;
      padding: 0 7% 0 4%;
      animation: fadeIn 1s ease 1.2s both;
      margin-left: -8vw;
    }

    /* Lueur ambiante subtile sur la droite */
    .right::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 70% 50%, rgba(201,169,110,0.03) 0%, transparent 70%);
      pointer-events: none;
    }

    .label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(0.7rem, 1vw, 1rem);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.2em;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .label::before {
      content: '';
      width: 36px;
      height: 1px;
      background: var(--gold);
      flex-shrink: 0;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: clamp(2.8rem, 5.5vw, 7rem);
      line-height: 1.0;
      margin-bottom: 0.2em;
      color: var(--text);
      letter-spacing: -0.02em;
      white-space: nowrap;
    }
    h1 span {
      color: #e2c99a;
      font-weight: 400;
      font-style: italic;
    }

    .subtitle {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 300;
      font-size: clamp(1rem, 1.6vw, 1.7rem);
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 2em;
    }

    .divider {
      width: 52px;
      height: 1.5px;
      background: linear-gradient(90deg, var(--gold), transparent);
      margin-bottom: 1.8em;
    }

    .message {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(0.9rem, 1.2vw, 1.3rem);
      line-height: 1.85;
      color: #9e9892;
      font-weight: 300;
    }
    .message strong {
      color: var(--text);
      font-weight: 500;
    }

    .progress {
      margin-top: 2.4em;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--gold);
      animation: pulse 1.8s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.3s; }
    .dot:nth-child(3) { animation-delay: 0.6s; }

    .progress-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(0.7rem, 0.9vw, 0.9rem);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-left: 8px;
    }

    /* ══════════════════════════════
       PROTECTION
    ══════════════════════════════ */
    * {
      user-select: none;
      -webkit-user-select: none;
    }
    img {
      pointer-events: none;
      -webkit-user-drag: none;
    }

    /* ══════════════════════════════
       ANIMATIONS
    ══════════════════════════════ */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInDeco {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes drawLine {
      from { clip-path: inset(0 0 100% 0); }
      to   { clip-path: inset(0 0 0% 0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.88); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes floatY {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1);   opacity: 1;   }
      50%       { transform: scale(1.6); opacity: 0.3; }
    }

    /* ══════════════════════════════
       MOBILE
    ══════════════════════════════ */
    @media (max-width: 640px) {
      html, body {
        height: auto;
        overflow-y: auto;
        overflow-x: hidden;
      }

      .scene {
        flex-direction: column;
        height: auto;
        min-height: 100vh;
      }

      .left {
        width: 100%;
        height: 52vh;
        flex-shrink: 0;
      }

      .photo-frame { height: 36vh; }

      .right {
        flex: none;
        width: 100%;
        padding: 6% 10% 10%;
        align-items: flex-start;
        margin-left: 0;
      }

      h1 { white-space: normal; }
    }
  </style>
</head>
<body>
  <div class="scene">

    <!-- ═══ GAUCHE ═══ -->
    <div class="left">

      <!-- Ligne verticale -->
      <div class="v-line"></div>

      <!-- Cercles décoratifs -->
      <div class="deco-circle-lg"></div>
      <div class="deco-circle-md"></div>

      <!-- Grilles de points -->
      <div class="deco-dots"></div>
      <div class="deco-dots-2"></div>

      <!-- Carrés -->
      <div class="deco-sq-1"></div>
      <div class="deco-sq-2"></div>

      <!-- Lignes courtes -->
      <div class="deco-h deco-h-1"></div>
      <div class="deco-h deco-h-2"></div>

      <!-- Zigzags -->
      <svg class="deco-zigzag" width="44" height="36" viewBox="0 0 44 36" fill="none">
        <polyline points="0,8  11,0  22,8  33,0  44,8"  stroke="#c9a96e" stroke-width="1.5" fill="none"/>
        <polyline points="0,20 11,12 22,20 33,12 44,20" stroke="#c9a96e" stroke-width="1.5" fill="none"/>
        <polyline points="0,32 11,24 22,32 33,24 44,32" stroke="#c9a96e" stroke-width="1.5" fill="none"/>
      </svg>
      <svg class="deco-zigzag-2" width="36" height="28" viewBox="0 0 36 28" fill="none">
        <polyline points="0,6  9,0  18,6  27,0  36,6"   stroke="#c9a96e" stroke-width="1.2" fill="none"/>
        <polyline points="0,16 9,10 18,16 27,10 36,16"  stroke="#c9a96e" stroke-width="1.2" fill="none"/>
        <polyline points="0,26 9,20 18,26 27,20 36,26"  stroke="#c9a96e" stroke-width="1.2" fill="none"/>
      </svg>

      <!-- Fragments de code -->
      <span class="deco-code deco-code-1">const dev = true;</span>
      <span class="deco-code deco-code-2">&lt;Portfolio /&gt;</span>
      <span class="deco-code deco-code-3">{ design }</span>
      <span class="deco-code deco-code-4">01001</span>

      <!-- Photo encadrée -->
      <div class="photo-frame">
        <span class="corner tl"></span>
        <span class="corner tr"></span>
        <span class="corner bl"></span>
        <span class="corner br"></span>
        <img src="static/media/moi.1534d679.png" alt="Abdourahmane Touré" />
      </div>

    </div>

    <!-- ═══ DROITE ═══ -->
    <div class="right">
      <div>
        <p class="label">Portfolio</p>
        <h1>Abdourahmane<br /><span>Touré</span></h1>
        <p class="subtitle">Développeur Full-Stack</p>
        <div class="divider"></div>
        <p class="message">
          Mon portfolio est actuellement <strong>en cours de construction</strong>.<br />
          Je prépare quelque chose de soigné: projets, expériences et réalisations.<br />
          Revenez bientôt.
        </p>
        <div class="progress">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="progress-label">En cours</span>
        </div>
      </div>
    </div>

  </div>
  <script>
    // Désactive le clic droit
    document.addEventListener('contextmenu', e => e.preventDefault());
    // Désactive la copie clavier
    document.addEventListener('copy', e => e.preventDefault());
    // Désactive le drag
    document.addEventListener('dragstart', e => e.preventDefault());
  </script>
</body>
</html>
